# Serve profile for the dspark-vllm-gx10 (vLLM 0.25.1) lane. The image is the anemll
# GB10 port + the PR #47356 fix layer (patches/vllm-pr47356-vgx10/); this repo's own tuned
# serve argv is adapted for 0.25.1. Local adaptations vs a stock serve command:
#   - container_name vllm-dsv4 (stable name for preflight/metrics/stop)
#   - API --host/--port env-driven, defaults 127.0.0.1:8000 (loopback-only)
#   - vLLM 0.25.1: breakable-cudagraph kept on, Triton cache pinned to the persistent bind,
#     CUDA-graph capture ceiling on the *2 formula (see docs/08)
#   - the command preamble's PATH/CUDA_HOME/vllm-binary paths are the anemll gx10 image's
#     OWN internal layout (/usr/local/cuda, /usr/local/bin/vllm) — NOT the prior 0.21.x
#     lane's image layout (/opt/env/...). Do not copy the old lane's preamble verbatim if
#     you're building on a different base image; check that base's actual layout.
# The prior 0.21.x lane's serve profile is preserved in git history and docs/08.
services:
  vllm-dspark:
    image: ${DSPARK_VLLM_IMAGE:-vllm-dspark-runtime:vgx10-cand1-pr47356}
    # REQUIRED for the gx10 base: neutralizes its baked ENTRYPOINT so `command: bash -lc`
    # below runs directly. Without this, the container double-execs (baked entrypoint wraps
    # `bash -lc`) and crash-loops on startup. The prior 0.21.x lane's base did not need this.
    entrypoint: []
    container_name: vllm-dsv4
    network_mode: host
    ipc: host
    shm_size: "64gb"

    ulimits:
      memlock: -1
      stack: 67108864

    gpus: all

    devices:
      - /dev/infiniband:/dev/infiniband

    volumes:
      - ${HF_CACHE:-${HOME}/.cache/huggingface}:/cache/huggingface

    environment:
      HF_HOME: /cache/huggingface
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-1}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-1}"
      HF_HUB_DISABLE_XET: "${HF_HUB_DISABLE_XET:-1}"
      VLLM_CACHE_ROOT: /cache/huggingface/vllm-cache
      # Long-context crash fix kill-switch (see docs/LONG_CONTEXT_CRASH_FIX.md).
      # 1 (default) = clamp stale DSpark draft-KV slot ids; 0 = detect+log only.
      DSPARK_SLOT_CLAMP: "${DSPARK_SLOT_CLAMP:-1}"
      VLLM_HOST_IP: "${VLLM_HOST_IP:-}"

      # 0 (default) keeps vLLM's guard that MAX_MODEL_LEN cannot exceed the model's
      # derived ceiling (== 65536*16 for this model). Set 1 only to deliberately
      # extrapolate past calibration (unsupported); 0 removes that latent footgun.
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-0}"
      VLLM_TRITON_MLA_SPARSE: "${VLLM_TRITON_MLA_SPARSE:-1}"
      VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "${VLLM_SPARSE_INDEXER_MAX_LOGITS_MB:-256}"
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "${VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS:-0}"
      VLLM_SKIP_INIT_MEMORY_CHECK: "${VLLM_SKIP_INIT_MEMORY_CHECK:-1}"
      # Per-step model-execute timeout; a larger value tolerates long cudagraph
      # capture / first-step compiles at 1M context without a spurious abort.
      VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "${VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS:-300}"

      # FlashInfer sampler: part of the DSpark garble fix AND hang-safe on this lane —
      # the base's FlashInfer 0.6.15-dev carries PR #3615 (same fix for both). See docs/08.
      VLLM_USE_FLASHINFER_SAMPLER: "${VLLM_USE_FLASHINFER_SAMPLER:-1}"
      # vLLM 0.25.1 auto-enables the breakable CUDA-graph path for DeepSeek-V4 (no
      # @support_torch_compile). Keep =1; =0 forces an unsupported torch.compile path that
      # regressed spec-decode acceptance and KV here. See docs/08.
      VLLM_USE_BREAKABLE_CUDAGRAPH: "${VLLM_USE_BREAKABLE_CUDAGRAPH:-1}"

      VLLM_USE_B12X_MOE: "${VLLM_USE_B12X_MOE:-1}"
      VLLM_USE_B12X_WO_PROJECTION: "${VLLM_USE_B12X_WO_PROJECTION:-1}"
      VLLM_B12X_W4A16_FORCE_BLOCKS_PER_SM: "${VLLM_B12X_W4A16_FORCE_BLOCKS_PER_SM:-0}"
      VLLM_B12X_W4A16_FORCE_BLOCKS_MAX_M: "${VLLM_B12X_W4A16_FORCE_BLOCKS_MAX_M:-16}"
      VLLM_B12X_W4A16_FORCE_TILE_CONFIG: "${VLLM_B12X_W4A16_FORCE_TILE_CONFIG:-}"
      B12X_W4A16_TC_DECODE: "${B12X_W4A16_TC_DECODE:-0}"

      VLLM_DSPARK_CONFIDENCE_THRESHOLD: "${VLLM_DSPARK_CONFIDENCE_THRESHOLD:-0.0}"
      VLLM_DSPARK_CONFIDENCE_SCHEDULER: "${VLLM_DSPARK_CONFIDENCE_SCHEDULER:-off}"
      VLLM_DSPARK_LOCAL_ARGMAX: "${VLLM_DSPARK_LOCAL_ARGMAX:-1}"
      VLLM_DSPARK_REPLICATE_MARKOV_W1: "${VLLM_DSPARK_REPLICATE_MARKOV_W1:-1}"
      VLLM_DSPARK_FUSED_MARKOV_ARGMAX: "${VLLM_DSPARK_FUSED_MARKOV_ARGMAX:-0}"
      VLLM_DSPARK_GPU_REJECTED_CONTEXT_MASK: "${VLLM_DSPARK_GPU_REJECTED_CONTEXT_MASK:-1}"
      VLLM_DSPARK_REFERENCE_KV_QUANT_DEQUANT: "${VLLM_DSPARK_REFERENCE_KV_QUANT_DEQUANT:-0}"
      VLLM_DSPARK_HARDWARE_SCHEDULER_EARLY_STOP: "${VLLM_DSPARK_HARDWARE_SCHEDULER_EARLY_STOP:-1}"
      VLLM_DSV4_B12X_COMPRESSED_MLA: "${VLLM_DSV4_B12X_COMPRESSED_MLA:-0}"
      VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE: "${VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE:-0}"
      VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE_EXACT: "${VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE_EXACT:-0}"

      TORCH_CUDA_ARCH_LIST: "${TORCH_CUDA_ARCH_LIST:-12.1a}"
      FLASHINFER_CUDA_ARCH_LIST: "${FLASHINFER_CUDA_ARCH_LIST:-12.1a}"
      FLASHINFER_DISABLE_VERSION_CHECK: "${FLASHINFER_DISABLE_VERSION_CHECK:-1}"
      TILELANG_CLEANUP_TEMP_FILES: "${TILELANG_CLEANUP_TEMP_FILES:-1}"
      TILELANG_CACHE_DIR: "${TILELANG_CACHE_DIR:-/cache/huggingface/tilelang}"
      # Triton kernel cache MUST be on the persistent bind: under breakable-cudagraph vLLM's
      # cache-redirect never runs, so an unset value falls through to container-ephemeral
      # /root/.triton/cache and cold-recompiles on every container recreate. See docs/07, docs/08.
      TRITON_CACHE_DIR: "${TRITON_CACHE_DIR:-/cache/huggingface/triton}"
      DG_JIT_USE_NVRTC: "${DG_JIT_USE_NVRTC:-0}"
      DG_JIT_NVCC_COMPILER: "${DG_JIT_NVCC_COMPILER:-/usr/local/cuda/bin/nvcc}"  # gx10 image path; the prior 0.21.x lane's was /opt/env/bin/nvcc
      PYTORCH_CUDA_ALLOC_CONF: "${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}"

      NCCL_NET: "${NCCL_NET:-IB}"
      NCCL_IB_DISABLE: "${NCCL_IB_DISABLE:-0}"
      NCCL_IB_HCA: "${NCCL_IB_HCA}"
      NCCL_SOCKET_IFNAME: "${NCCL_SOCKET_IFNAME}"
      GLOO_SOCKET_IFNAME: "${GLOO_SOCKET_IFNAME:-${NCCL_SOCKET_IFNAME}}"
      NCCL_IB_GID_INDEX: "${NCCL_IB_GID_INDEX:-}"
      NCCL_CROSS_NIC: "${NCCL_CROSS_NIC:-1}"
      NCCL_IB_MERGE_NICS: "${NCCL_IB_MERGE_NICS:-1}"
      NCCL_CUMEM_ENABLE: "${NCCL_CUMEM_ENABLE:-0}"
      NCCL_IGNORE_CPU_AFFINITY: "${NCCL_IGNORE_CPU_AFFINITY:-1}"
      NCCL_DEBUG: "${NCCL_DEBUG:-WARN}"
      NCCL_NVLS_ENABLE: "${NCCL_NVLS_ENABLE:-0}"

      NODE_RANK: "${NODE_RANK}"
      HEADLESS: "${HEADLESS:-}"
      MASTER_ADDR: "${MASTER_ADDR}"
      MASTER_PORT: "${MASTER_PORT:-25000}"
      MTP_NUM_TOKENS: "${MTP_NUM_TOKENS:-3}"

      # Reasoning toggle (see docs/06). on (default) = server-default thinking + the official
      # V4-Flash reasoning sampling (temp/top_p 1.0); off = non-think greedy, byte-identical to the
      # original tuned recipe. Effort: high (default) or max (max needs MAX_MODEL_LEN>=393216).
      DSPARK_REASONING: "${DSPARK_REASONING:-on}"
      DSPARK_REASONING_EFFORT: "${DSPARK_REASONING_EFFORT:-high}"

    # NOTE: keep BOTH --generation-config vllm and --override-generation-config — complementary, not
    # redundant (vllm ignores the model's generation_config.json; override overlays sampling). Part of
    # the agent-garble fix. The reasoning toggle below builds CHAT_KWARGS/GEN_OVERRIDE in-shell.
    command:
      - bash
      - -lc
      - >
        [ -n "$${NCCL_IB_GID_INDEX:-}" ] || unset NCCL_IB_GID_INDEX;
        export PATH="/usr/local/cuda/bin:$${PATH:-}";
        export CUDA_HOME="$${CUDA_HOME:-/usr/local/cuda}";
        export CUDA_PATH="$${CUDA_PATH:-$${CUDA_HOME}}";
        export CUDAToolkit_ROOT="$${CUDAToolkit_ROOT:-$${CUDA_HOME}}";
        export LD_LIBRARY_PATH="/usr/local/cuda/lib64:$${LD_LIBRARY_PATH:-}";
        SPECULATIVE_CONFIG="{\"method\":\"dspark\",\"num_speculative_tokens\":${MTP_NUM_TOKENS:-3},\"draft_sample_method\":\"probabilistic\"}";
        if [ "$${DSPARK_REASONING:-on}" = "on" ]; then CHAT_KWARGS="{\"thinking\":true,\"reasoning_effort\":\"$${DSPARK_REASONING_EFFORT:-high}\"}"; GEN_OVERRIDE="{\"temperature\":1.0,\"top_p\":1.0}"; else CHAT_KWARGS="{\"thinking\":false}"; GEN_OVERRIDE="{\"temperature\":0.0,\"top_p\":1.0}"; fi;
        exec /usr/local/bin/vllm serve ${DSPARK_MODEL:-deepseek-ai/DeepSeek-V4-Flash-DSpark}
        --served-model-name ${SERVED_MODEL_NAME:-deepseek-v4-flash-dspark}
        --host ${VLLM_HOST:-127.0.0.1}
        --port ${API_PORT:-8000}
        --trust-remote-code
        --tensor-parallel-size 2
        --pipeline-parallel-size 1
        --kv-cache-dtype ${KV_CACHE_DTYPE:-nvfp4_ds_mla}
        --block-size 256
        --max-model-len ${MAX_MODEL_LEN:-1048576}
        --max-num-seqs ${MAX_NUM_SEQS:-6}
        --max-num-batched-tokens ${MAX_NUM_BATCHED_TOKENS:-8192}
        --long-prefill-token-threshold ${LONG_PREFILL_TOKEN_THRESHOLD:-0}
        --shutdown-timeout ${SHUTDOWN_TIMEOUT:-30}
        --max-cudagraph-capture-size ${MAX_CUDAGRAPH_CAPTURE_SIZE:-96}
        --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.80}
        --enable-prefix-caching
        --async-scheduling
        --enable-chunked-prefill
        --speculative-config "$${SPECULATIVE_CONFIG}"
        --tokenizer-mode deepseek_v4
        --distributed-executor-backend mp
        --tool-call-parser deepseek_v4
        --enable-auto-tool-choice
        --reasoning-parser deepseek_v4
        --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"<think>","reasoning_end_str":"</think>"}'
        --default-chat-template-kwargs "$${CHAT_KWARGS}"
        --generation-config vllm
        --override-generation-config "$${GEN_OVERRIDE}"
        --enable-flashinfer-autotune
        --nnodes 2
        --node-rank ${NODE_RANK}
        --master-addr ${MASTER_ADDR}
        --master-port ${MASTER_PORT:-25000}
        ${HEADLESS:+--headless}
